[loggers]
keys=root

[handlers]
keys=file

[formatters]
keys=standard,detailed

[logger_root]
level=DEBUG
handlers=file

[handler_file]
class=FileHandler
level=DEBUG
formatter=detailed
args=('logs/message.log', 'a')

[formatter_standard]
format=%(name)s - %(levelname)s - %(message)s

[formatter_detailed]
format=%(asctime)s - %(levelname)6s - %(name)45s - %(funcName)-35s:%(lineno)5d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
